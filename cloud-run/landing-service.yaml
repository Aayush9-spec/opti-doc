apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: optidock-landing
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "OptiDock AI — Next.js landing page"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: us-central1-docker.pkg.dev/nth-bounty-477010-h8/optidock/optidock-landing:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: 256Mi
              cpu: "1"
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
