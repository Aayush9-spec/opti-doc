apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: optidock-cli
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "OptiDock AI — Rust-first Docker optimization agent API"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: us-central1-docker.pkg.dev/nth-bounty-477010-h8/optidock/optidock-cli:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: PORT
              value: "8080"
            - name: OPTIDOCK_PROVIDER
              value: "openai"
            - name: RUST_LOG
              value: "info"
